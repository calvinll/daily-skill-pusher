<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>好逛的skill社区</title>
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <span class="eyebrow">Daily Skill Digest</span>
        <h1>好逛的skill社区</h1>
        <p>每日推荐最好用的 skill。</p>
        <nav class="tabs">
          <a href="./index.html">首页</a>
          <a href="./history.html">历史推荐</a>
          <a href="./skills.html">技能列表</a>
        </nav>
      </header>
      <section class="hero-grid">
        <article id="today-card" class="card card-featured"></article>
        <aside class="card card-sidekick">
          <h2>推荐规则</h2>
          <ul class="feature-list">
            <li>官方文档来源优先</li>
            <li>周一到周五主题编排</li>
            <li>学习路径与 related skills 跟进</li>
            <li>结合近期官方更新信号</li>
          </ul>
        </aside>
      </section>
      <section class="section-shell">
        <div class="section-heading">
          <span class="eyebrow">Spotlight</span>
          <h2>近期值得关注</h2>
          <p>把近期在官方 changelog 和 what’s new 中出现的能力，单独拎出来方便快速浏览。</p>
        </div>
        <div id="spotlight-list" class="list spotlight-list"></div>
        <p id="spotlight-empty" class="empty-state" hidden>目前还没有额外的近期值得关注项。</p>
      </section>
    </main>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
