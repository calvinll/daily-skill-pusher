name: Daily skill push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Primary 09:05 Asia/Shanghai = 01:05 UTC
    - cron: '5 1 * * *'
    # Backup 10:05 Asia/Shanghai = 02:05 UTC
    - cron: '5 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-skill-push
  cancel-in-progress: false

jobs:
  daily-push:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      APP_TIMEZONE: ${{ vars.APP_TIMEZONE || 'Asia/Shanghai' }}
      CRON_EXPRESSION: 5 9 * * *
      FEISHU_ENABLED: true
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
      FEISHU_REQUIRED_KEYWORD: ${{ secrets.FEISHU_REQUIRED_KEYWORD }}
      DATA_DIR: ./data
      DAYS_TO_AVOID_REPEAT: 14
      AVOID_SAME_CATEGORY_DAYS: 2
      DAILY_COUNT: 1
      SCHEDULER_ENABLED: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate config
        run: npm run validate

      - name: Send daily push
        run: npm run push

      - name: Commit updated push history
        run: |
          if git diff --quiet -- data/push-history.json; then
            echo "No history change to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/push-history.json
          git commit -m "chore: update push history"
          git push
